# Configuracion de Mosquitto para TFG
#
# Two listeners:
#   1883 - MQTT/TCP    → backend (Node), Unity (M2Mqtt), ESP32
#   9001 - MQTT/WSS    → navegador (web admin con mqtt.js)

# Listener nativo MQTT sobre TCP
listener 1883
protocol mqtt
allow_anonymous true

# Listener MQTT sobre WebSockets para clientes navegador
listener 9001
protocol websockets
allow_anonymous true

# Persistencia básica: los mensajes retain sobreviven a reinicios del broker
persistence true

# Logs al stdout para verlos en docker logs / la consola
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
